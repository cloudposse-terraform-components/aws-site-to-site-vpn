  - https://aws.amazon.com/vpn/site-to-site-vpn
  - https://docs.aws.amazon.com/vpn/latest/s2svpn/VPC_VPN.html
  - https://docs.aws.amazon.com/AWSEC2/latest/APIReference/API_VpnTunnelOptionsSpecification.html

